<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体育成绩打分器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { opacity: 0.9; font-size: 14px; }
        
        .content { padding: 25px; }
        
        .gender-switch {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        .gender-btn {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .gender-btn.active {
            border-color: #11998e;
            background: #e8f8f5;
            color: #11998e;
            font-weight: bold;
        }
        
        .input-group { margin-bottom: 18px; }
        .input-group label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #11998e;
        }
        .input-group .unit {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        
        .calc-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .calc-btn:active { transform: scale(0.98); }
        
        .result {
            margin-top: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
        }
        .result.show { display: block; }
        .result h3 {
            text-align: center;
            color: #11998e;
            font-size: 32px;
            margin-bottom: 15px;
        }
        
        .tips {
            margin-top: 20px;
            padding: 12px;
            background: #fff3cd;
            border-radius: 8px;
            font-size: 12px;
            color: #856404;
            text-align: center;
        }
        
        .raw-input {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .raw-input input { flex: 1; }
        .raw-input .arrow { color: #11998e; font-size: 20px; }
        .raw-input .score-result {
            width: 70px;
            text-align: center;
            font-weight: bold;
            color: #11998e;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>宏璞体育成绩打分器</h1>
            <p>河南兰考中考体育标准</p>
        </div>
        
        <div class="content">
            <div class="gender-switch">
                <button class="gender-btn active" id="btnMale" onclick="setGender('male')">👦 男生</button>
                <button class="gender-btn" id="btnFemale" onclick="setGender('female')">👧 女生</button>
            </div>
            
            <div class="input-group">
                <label>⚽ 足球 (秒)</label>
                <div class="raw-input">
                    <input type="number" id="football" placeholder="运球时间" step="0.1">
                    <span class="arrow">→</span>
                    <div class="score-result" id="scoreFootball">-</div>
                </div>
            </div>
            
            <div class="input-group">
                <label>🪢 一分钟跳绳 (个)</label>
                <div class="raw-input">
                    <input type="number" id="jumpRope" placeholder="跳绳个数">
                    <span class="arrow">→</span>
                    <div class="score-result" id="scoreJumpRope">-</div>
                </div>
            </div>
            
            <div class="input-group">
                <label>🦘 立定跳远 (米)</label>
                <div class="raw-input">
                    <input type="number" id="longJump" placeholder="距离" step="0.01">
                    <span class="arrow">→</span>
                    <div class="score-result" id="scoreLongJump">-</div>
                </div>
            </div>
            
            <div class="input-group">
                <label>🏃 跑步 (秒)</label>
                <div class="raw-input">
                    <input type="number" id="run" placeholder="跑步时间" step="0.01">
                    <span class="arrow">→</span>
                    <div class="score-result" id="scoreRun">-</div>
                </div>
                <div class="unit">男生跑1000米，女生跑800米</div>
            </div>
            
            <button class="calc-btn" onclick="calculate()">计算总分</button>
            
            <div class="result" id="result">
                <h3>总分: <span id="totalScore">0</span> 分</h3>
            </div>
            
            <div class="tips">
                💡 基于官方评分标准，输入成绩实时显示得分
            </div>
        </div>
    </div>
